version: 1
last_updated: 2026-05-29
status: canonical
source_of_truth: curriculum.yaml

principles:
  - 课程元信息以本文件为准，历史文档中的周次和课时逐步向本文件收敛。
  - 每个阶段必须有明确目标、交付物、考核标准和至少一个可运行实验。
  - 学员材料、讲师答案、评分 rubrics 应分层维护，避免答案混入学员练习。

stages:
  - id: L0
    name: 预备阶段：编程基本功
    target_role: 编程入门
    path: L0_预备阶段/README.md
    duration: 8周
    hours:
      classroom: 67
      self_study: 93
      total: 160
    projects:
      core: 3
      supplemental: 0
    focus:
      - Python 数据处理
      - SQL 查询
      - Linux 命令行
      - Git 与 Docker 基础
    key_outputs:
      - Web 日志分析系统
      - 电商数据库设计与 SQL 分析
      - 命令行环境运维实战

  - id: L1
    name: 初级工程师：大数据入门
    target_role: 大数据初级工程师
    path: L1_初级工程师/README.md
    duration: 8周主线
    hours:
      classroom: 48
      lab: 72
      project: 80
      total: 200
    projects:
      core: 3
      supplemental: 1
    focus:
      - HDFS 与 MapReduce
      - Hive 离线数仓
      - Spark Core 与 Spark SQL
      - Airflow 编排
      - OLAP 引擎入门
    key_outputs:
      - 离线数仓构建
      - Spark 用户画像系统
      - Airflow 工作流编排

  - id: L2
    name: 中级工程师：工程深化
    target_role: 大数据中级工程师
    path: L2_中级工程师/README.md
    duration: 8周主线 + 补充模块按需
    hours:
      core: 320
      supplemental: 85
      total: 405
    projects:
      core: 3
      supplemental: 5
    focus:
      - Kafka 深入
      - Flink 流处理
      - DDIA 精读
      - 数据湖仓与数据治理
      - 跨行业实时数据方案
    key_outputs:
      - 实时交易监控大屏
      - Kafka 深度调优报告
      - 数据管道故障排查手册
      - Hive 到 Iceberg 湖仓迁移
      - 数据治理平台搭建

  - id: L3
    name: 高级工程师：技术深度
    target_role: 大数据高级工程师
    path: L3_高级工程师/README.md
    duration: 14周主线 + 补充模块按需
    hours:
      core: 400
      supplemental: 140
      total: 540
    projects:
      core: 2
      supplemental: 2
    focus:
      - 论文精读
      - Spark/Flink/Kafka 源码深潜
      - 性能调优攻坚
      - MLOps 与 AI 工程
      - 云原生大数据部署
    key_outputs:
      - 12 篇论文精读笔记
      - 源码分析系列文章
      - Spark/Flink 调优攻坚报告
      - MLOps 平台
      - 云原生大数据平台迁移

  - id: L4
    name: 架构师：全局设计
    target_role: 数据架构师
    path: L4_架构师/README.md
    duration: 20周主线 + 补充模块按需
    hours:
      core: 480
      self_study: 600
      total: 1080
    projects:
      core: 3
      supplemental: 1
    focus:
      - 系统设计训练
      - 企业大数据平台架构设计
      - FinOps 成本优化
      - dbt 与数据 CI/CD
    key_outputs:
      - 8 份系统设计文档
      - 企业大数据平台架构方案
      - 成本优化方案
      - dbt 项目代码与 CI/CD 流水线

  - id: L5
    name: CTO 视野：战略与领导力
    target_role: CTO / 技术 VP
    path: L5_CTO视野/README.md
    duration: 持续进阶
    hours:
      total: 按需
    projects:
      core: 1
      supplemental: 0
    focus:
      - 技术战略
      - 组织建设
      - 商业翻译
      - 行业影响
      - AI 与数据融合战略
    key_outputs:
      - 技术战略备忘录
      - 工程师能力模型
      - CTO 年度述职报告

quality_gates:
  - name: link-check
    command: python3 scripts/check_links.py
  - name: placeholder-check
    command: python3 scripts/check_placeholders.py
  - name: curriculum-ref-check
    command: python3 scripts/check_curriculum_refs.py
  - name: project-catalog-check
    command: python3 scripts/check_project_catalog.py
  - name: assessment-structure-check
    command: python3 scripts/validate_assessments.py
  - name: l0-lab-test
    command: make lab-l0-test
  - name: all-lab-tests
    command: make lab-test
