      - 课程总课件: big_data_courseware.md
      - 贯穿项目: 贯穿项目_电商数据平台演进/电商数据平台全周期演进指南.md
      - 学习进度追踪: 学习进度追踪体系.md
  - 阶段课程:
      - L0 预备阶段: L0_预备阶段/README.md
      - L1 初级工程师: L1_初级工程师/README.md
      - L2 中级工程师: L2_中级工程师/README.md
      - L3 高级工程师: L3_高级工程师/README.md
      - L4 架构师: L4_架构师/README.md
      - L5 CTO 视野: L5_CTO视野/README.md
  - 互动学习:
