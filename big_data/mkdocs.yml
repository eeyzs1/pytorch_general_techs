      - L0 Web 日志分析实验: labs/l0-web-log-analysis/README.md
      - L1 SQL 数仓实验: labs/l1-sql-warehouse/README.md
      - L2 实时窗口实验: labs/l2-streaming-window/README.md
      - L3 数据倾斜调优实验: labs/l3-skew-tuning/README.md
      - L4 架构评分卡实验: labs/l4-architecture-scorecard/README.md
