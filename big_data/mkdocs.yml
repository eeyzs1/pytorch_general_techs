site_name: 大数据技术全栈课程
site_description: 从编程基础到 CTO 视野的大数据技术课程资料库
docs_dir: .docs_src
site_dir: .site
use_directory_urls: false
validation:
  omitted_files: ignore
  unrecognized_links: ignore

